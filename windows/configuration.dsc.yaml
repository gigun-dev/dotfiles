# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
#
# Windows 宣言的構成 — Mac 側 nix run .#switch に相当
#
# 適用: 管理者権限の PowerShell から
#   winget configure --file windows\configuration.dsc.yaml --accept-configuration-agreements
#
# または:
#   pwsh -File windows\setup.ps1

properties:
  resources:
    # ========================================================================
    # Packages (winget)
    # ========================================================================
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-git
      directives: { description: Git for Windows }
      settings: { id: Git.Git, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-gh
      directives: { description: GitHub CLI }
      settings: { id: GitHub.cli, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-vscode
      directives: { description: Visual Studio Code }
      settings: { id: Microsoft.VisualStudioCode, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-cursor
      directives: { description: Cursor editor }
      settings: { id: Anysphere.Cursor, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-zed
      directives: { description: Zed editor }
      settings: { id: ZedIndustries.Zed, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-wezterm
      directives: { description: WezTerm terminal }
      settings: { id: wez.wezterm, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-kanata
      directives: { description: Kanata keyboard remapper }
      settings: { id: jtroo.kanata_gui, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-claude-desktop
      directives: { description: Claude Desktop }
      settings: { id: Anthropic.Claude, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-chrome
      directives: { description: Google Chrome }
      settings: { id: Google.Chrome, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-figma
      directives: { description: Figma }
      settings: { id: Figma.Figma, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-vncviewer
      directives: { description: RealVNC Viewer (remote desktop to Mac mini) }
      settings: { id: RealVNC.VNCViewer, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-icloud
      directives: { description: iCloud for Windows (Chrome iCloud Passwords 拡張に必要) }
      settings: { id: 9PKTQ5699M62, source: msstore }

    # uv / nodejs / bun / deno / pnpm は WSL 内 home-manager 管理 (Mac 側 packages.nix と同じ扱い)
    # Windows ネイティブには dev ランタイムを入れない

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-pwsh7
      directives: { description: PowerShell 7 }
      settings: { id: Microsoft.PowerShell, source: winget }

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pkg-autohotkey
      directives: { description: AutoHotkey v2 (hotkey scripts) }
      settings: { id: AutoHotkey.AutoHotkey, source: winget }

    # ========================================================================
    # Explorer tweaks (tweaks/explorer.ps1 相当)
    # ========================================================================
    - resource: PSDscResources/Registry
      id: reg-show-hidden
      directives: { description: Show hidden files }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: Hidden
        ValueData: ['1']
        ValueType: Dword
        Force: true
        Ensure: Present

    - resource: PSDscResources/Registry
      id: reg-show-extensions
      directives: { description: Show file extensions }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: HideFileExt
        ValueData: ['0']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-launch-to-thispc
      directives: { description: Open Explorer to This PC }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: LaunchTo
        ValueData: ['1']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-hide-checkboxes
      directives: { description: Hide item checkboxes }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: AutoCheckSelect
        ValueData: ['0']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-full-path-titlebar
      directives: { description: Full path in title bar }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\CabinetState
        ValueName: FullPath
        ValueData: ['1']
        ValueType: Dword
        Force: true

    # ========================================================================
    # UI noise reduction (tweaks/startup.ps1 相当)
    # ========================================================================
    - resource: PSDscResources/Registry
      id: reg-no-widgets
      directives: { description: Disable taskbar widgets icon }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: TaskbarDa
        ValueData: ['0']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-no-chat
      directives: { description: Disable taskbar Chat icon }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: TaskbarMn
        ValueData: ['0']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-no-copilot
      directives: { description: Disable Copilot taskbar button }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: ShowCopilotButton
        ValueData: ['0']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-searchbox-icon-only
      directives: { description: Search box as icon only }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Search
        ValueName: SearchboxTaskbarMode
        ValueData: ['1']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-taskbar-center
      directives: { description: Taskbar alignment center (Mac-like) }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: TaskbarAl
        ValueData: ['1']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-no-advertising-id
      directives: { description: Disable advertising ID }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\AdvertisingInfo
        ValueName: Enabled
        ValueData: ['0']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-no-start-recommendations
      directives: { description: Disable Start menu recommendations }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        ValueName: Start_IrisRecommendations
        ValueData: ['0']
        ValueType: Dword
        Force: true

    # ========================================================================
    # Performance (tweaks/performance.ps1 相当)
    # ========================================================================
    # VisualFXSetting=3 (カスタム) にして EnableTransparency + 個別軽量化設定を両立
    # VisualFXSetting=2 (パフォーマンス優先) だと透過描画自体が禁止され WezTerm 等の
    # window_background_opacity が効かなくなる副作用がある
    - resource: PSDscResources/Registry
      id: reg-visual-fx-custom
      directives: { description: Visual effects = Custom (respect individual settings) }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects
        ValueName: VisualFXSetting
        ValueData: ['3']
        ValueType: Dword
        Force: true

    - resource: PSDscResources/Registry
      id: reg-no-fast-startup
      directives: { description: Disable Fast Startup (hiberboot) }
      settings:
        Key: HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Power
        ValueName: HiberbootEnabled
        ValueData: ['0']
        ValueType: Dword
        Force: true

    # ドラッグ中はウィンドウ枠のみ表示 (GPU/CPU 負荷軽減)
    - resource: PSDscResources/Registry
      id: reg-drag-outline-only
      directives: { description: Drag window outline only (lighter) }
      settings:
        Key: HKCU:\Control Panel\Desktop
        ValueName: DragFullWindows
        ValueData: ['0']
        ValueType: String
        Force: true

    # メニュー表示遅延を最小化 (400ms → 0ms)
    - resource: PSDscResources/Registry
      id: reg-menu-no-delay
      directives: { description: Remove menu show delay }
      settings:
        Key: HKCU:\Control Panel\Desktop
        ValueName: MenuShowDelay
        ValueData: ['0']
        ValueType: String
        Force: true

    # ウィンドウ最小化/最大化アニメーション OFF
    - resource: PSDscResources/Registry
      id: reg-no-min-animate
      directives: { description: Disable minimize/maximize animation }
      settings:
        Key: HKCU:\Control Panel\Desktop\WindowMetrics
        ValueName: MinAnimate
        ValueData: ['0']
        ValueType: String
        Force: true

    - resource: PSDscResources/Service
      id: svc-sysmain-disabled
      directives: { description: Disable SysMain (Superfetch) }
      settings:
        Name: SysMain
        State: Stopped
        StartupType: Disabled

    # DiagTrack (Connected User Experiences and Telemetry) 無効化
    # MS への診断データ送信、開発機では不要。~30-80 MB RAM + I/O 削減
    - resource: PSDscResources/Service
      id: svc-diagtrack-disabled
      directives: { description: Disable DiagTrack (Telemetry) }
      settings:
        Name: DiagTrack
        State: Stopped
        StartupType: Disabled

    # OneDrive を startup から除外 (sync 使わない場合、~100-150 MB RAM 節約)
    - resource: PSDscResources/Registry
      id: reg-no-onedrive-startup
      directives: { description: Remove OneDrive from user startup }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Run
        ValueName: OneDrive
        Ensure: Absent
        Force: true

    # OneSyncSvc (Sync Host) 無効化 — OneDrive / メール sync 等を停止 (使ってない場合)
    - resource: PSDscResources/Service
      id: svc-onesyncsvc-disabled
      directives: { description: Disable Sync Host (OneSyncSvc) }
      settings: { Name: OneSyncSvc, StartupType: Disabled }

    # Phone Link / クロスデバイス連携を削除 (モバイル連携不使用)
    - resource: PSDscResources/Script
      id: script-remove-mobile-link
      directives: { description: Remove Phone Link and CrossDevice apps }
      settings:
        GetScript: |
          @{ Result = ((Get-AppxPackage Microsoft.YourPhone, MicrosoftWindows.CrossDevice -EA 0).Name -join ',') }
        TestScript: |
          -not (Get-AppxPackage Microsoft.YourPhone, MicrosoftWindows.CrossDevice -EA 0)
        SetScript: |
          Get-AppxPackage Microsoft.YourPhone -EA 0 | Remove-AppxPackage -EA 0
          Get-AppxPackage MicrosoftWindows.CrossDevice -EA 0 | Remove-AppxPackage -EA 0

    # Windows Copilot 完全無効化 (Group Policy)
    - resource: PSDscResources/Registry
      id: reg-disable-copilot-policy
      directives: { description: Disable Windows Copilot via group policy }
      settings:
        Key: HKCU:\Software\Policies\Microsoft\Windows\WindowsCopilot
        ValueName: TurnOffWindowsCopilot
        ValueData: ['1']
        ValueType: Dword
        Force: true

    # Google Updater の Scheduled Task を無効化 (Chrome 本体起動時更新で十分)
    - resource: PSDscResources/Script
      id: script-disable-googleupdater-tasks
      directives: { description: Disable GoogleUpdater scheduled tasks }
      settings:
        GetScript: |
          @{ Result = ((Get-ScheduledTask -TaskName 'GoogleUpdater*' -EA 0 | Where-Object State -ne 'Disabled').TaskName -join ',') }
        TestScript: |
          $tasks = Get-ScheduledTask -TaskName 'GoogleUpdater*' -EA 0 | Where-Object State -ne 'Disabled'
          -not $tasks
        SetScript: |
          Get-ScheduledTask -TaskName 'GoogleUpdater*' -EA 0 | Disable-ScheduledTask -EA 0 | Out-Null

    # ========================================================================
    # Script リソース (複雑な手続きをここに隔離)
    # ========================================================================

    # Hibernation OFF — powercfg は Registry だけでは完結しないので Script
    - resource: PSDscResources/Script
      id: script-hibernation-off
      directives: { description: Disable hibernation (frees ~6GB hiberfil.sys) }
      settings:
        GetScript: |
          @{ Result = (Test-Path 'C:\hiberfil.sys') }
        TestScript: |
          -not (Test-Path 'C:\hiberfil.sys')
        SetScript: |
          powercfg /hibernate off

    # 電源プラン → High performance
    - resource: PSDscResources/Script
      id: script-power-high-perf
      directives: { description: Set power plan to High performance }
      settings:
        GetScript: |
          @{ Result = (powercfg /getactivescheme) }
        TestScript: |
          (powercfg /getactivescheme) -match '8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c'
        SetScript: |
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

    # JetBrains Mono Nerd Font インストール
    - resource: PSDscResources/Script
      id: script-install-nerdfont
      directives: { description: Install JetBrains Mono Nerd Font (user scope) }
      settings:
        GetScript: |
          @{ Result = Get-ChildItem "$env:LOCALAPPDATA\Microsoft\Windows\Fonts\JetBrainsMono*.ttf" -ErrorAction SilentlyContinue }
        TestScript: |
          $fontDir = "$env:LOCALAPPDATA\Microsoft\Windows\Fonts"
          (Test-Path "$fontDir\JetBrainsMonoNerdFontMono-Regular.ttf")
        SetScript: |
          & "$env:USERPROFILE\ghq\github.com\gigun-dev\dotfiles\windows\fonts\install.ps1"

    # Tailscale セットアップ (MSI + unattended mode)
    - resource: PSDscResources/Script
      id: script-tailscale
      directives: { description: Install Tailscale and enable unattended mode }
      settings:
        GetScript: |
          @{
            Result = @{
              Installed = (Test-Path 'C:\Program Files\Tailscale\tailscaled.exe')
              Service   = (Get-Service Tailscale -ErrorAction SilentlyContinue).Status
            }
          }
        TestScript: |
          (Test-Path 'C:\Program Files\Tailscale\tailscaled.exe') -and
          ((Get-Service Tailscale -ErrorAction SilentlyContinue).Status -eq 'Running')
        SetScript: |
          & "$env:USERPROFILE\ghq\github.com\gigun-dev\dotfiles\windows\tailscale\install-daemon.ps1"

    # Windows Defender 除外 (開発ディレクトリ)
    - resource: PSDscResources/Script
      id: script-defender-exclusions
      directives: { description: Windows Defender exclusions for dev dirs }
      settings:
        GetScript: |
          @{ Result = (Get-MpPreference).ExclusionPath }
        TestScript: |
          $required = @(
            "$env:USERPROFILE\ghq",
            "$env:USERPROFILE\.local",
            "$env:USERPROFILE\archive"
          )
          $current = (Get-MpPreference).ExclusionPath
          -not ($required | Where-Object { $_ -notin $current })
        SetScript: |
          $paths = @(
            "$env:USERPROFILE\ghq",
            "$env:USERPROFILE\.local",
            "$env:USERPROFILE\archive",
            "$env:USERPROFILE\.cache"
          )
          foreach ($p in $paths) { if (Test-Path $p) { Add-MpPreference -ExclusionPath $p } }
          $procs = @('node.exe','bun.exe','pnpm.exe','npm.exe','uv.exe','python.exe','git.exe')
          foreach ($x in $procs) { Add-MpPreference -ExclusionProcess $x }

    # Mac-like キーマップ (Scancode Map, system-wide, 要ログオフ/再起動)
    #
    # フォーマット: 8-byte header + 4-byte count (N+1) + N*4-byte mappings + 4-byte terminator
    #   各 mapping = [output VK low][output VK high][input VK low][input VK high] (little-endian)
    #
    # 36 bytes total = 72 hex chars. MBP JIS 最下段と完全一致する配置:
    #   MBP:  fn | ctrl | opt | cmd | 英数 | space | かな | cmd | opt
    #   HP:   Fn | Win  | Opt | Cmd | 英数 | space | かな | Cmd | Opt  (以下の remap で実現)
    #
    #   0000000000000000  header
    #   06000000          count = 5 mappings + 1 terminator
    #   1D003A00          Caps(3A)    -> LCtrl(1D)       小指 Ctrl (zsh hotkey / SIGINT)
    #   5BE01D00          LCtrl(1D)   -> LWin(E0 5B)     本物の Win キー (Win+L, Win+Shift+S)
    #   38005BE0          LWin(E0 5B) -> LAlt(38)        3 番目を Opt (MBP opt 位置と一致)
    #   64003800          LAlt(38)    -> F13(64)         4 番目を Cmd (MBP cmd 位置と一致、AHK で Ctrl+文字 に変換)
    #   65007000          カタカナ(70) -> F14(65)          右親指 Cmd (AHK で Ctrl+文字 に変換)
    #   00000000          terminator
    #
    # AHK 側: windows/hotkey/mac-like.ahk が F13/F14 + 文字 を Ctrl+文字 (WezTerm 内は Ctrl+Shift+文字) に変換
    - resource: PSDscResources/Registry
      id: reg-keymap-mac-like
      directives: { description: Mac-like keymap (LAlt=Cmd / LWin=Opt / LCtrl=Win / Caps=Ctrl / Kana=RCmd) }
      settings:
        Key: HKLM:\SYSTEM\CurrentControlSet\Control\Keyboard Layout
        ValueName: Scancode Map
        ValueData: '0000000000000000060000001D003A005BE01D0038005BE0640038006500700000000000'
        ValueType: Binary
        Force: true

    # Windows の透明効果を有効化 (WezTerm の window_background_opacity を効かせるため)
    # VisualFXSetting=2 (パフォーマンス優先) だと EnableTransparency が 0 になりオーバーライド必要
    - resource: PSDscResources/Registry
      id: reg-enable-transparency
      directives: { description: Enable Windows transparency effects (for WezTerm opacity) }
      settings:
        Key: HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize
        ValueName: EnableTransparency
        ValueData: ['1']
        ValueType: Dword
        Force: true

    # PrintScreen 単体で Snipping Tool を起動 (Win+Shift+S の代替保険)
    - resource: PSDscResources/Registry
      id: reg-printscreen-snipping
      directives: { description: PrintScreen key launches Snipping Tool }
      settings:
        Key: HKCU:\Control Panel\Keyboard
        ValueName: PrintScreenKeyForSnippingEnabled
        ValueData: ['1']
        ValueType: Dword
        Force: true

    # WezTerm を Iris Xe (iGPU) 強制 — GpuPreference=1 (Power saving / iGPU)
    # NVIDIA MX450 や自動選択だと WezTerm GitHub #4502 #5790 の dual-GPU alpha 欠落 bug に
    # 引っかかり window_background_opacity が効かない。DWM が iGPU で動くため同じ GPU に
    # 揃えると cross-adapter 共有問題を回避できる。
    - resource: PSDscResources/Registry
      id: reg-wezterm-gpu-igpu
      directives: { description: Force WezTerm to iGPU (Iris Xe) to fix transparency }
      settings:
        Key: HKCU:\Software\Microsoft\DirectX\UserGpuPreferences
        ValueName: C:\Program Files\WezTerm\wezterm-gui.exe
        ValueData: ['GpuPreference=1;']
        ValueType: String
        Force: true

# AHK スクリプト (WezTerm トグル + Mac-like キー変換) をスタートアップに登録
    - resource: PSDscResources/Script
      id: script-ahk-startup
      directives: { description: Register AHK scripts (wezterm-toggle, mac-like) in Startup }
      settings:
        GetScript: |
          $startup = "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Startup"
          @{ Result = @{
            WezTerm = (Test-Path "$startup\wezterm-toggle.ahk.lnk")
            MacLike = (Test-Path "$startup\mac-like.ahk.lnk")
          }}
        TestScript: |
          $startup = "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Startup"
          (Test-Path "$startup\wezterm-toggle.ahk.lnk") -and (Test-Path "$startup\mac-like.ahk.lnk")
        SetScript: |
          $dotfiles = "$env:USERPROFILE\ghq\github.com\gigun-dev\dotfiles"
          $startup  = "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Startup"
          $scripts  = @('wezterm-toggle.ahk', 'mac-like.ahk')
          $WshShell = New-Object -comObject WScript.Shell
          foreach ($script in $scripts) {
            $src = "$dotfiles\windows\hotkey\$script"
            $lnk = $WshShell.CreateShortcut((Join-Path $startup "$script.lnk"))
            $lnk.TargetPath = $src
            $lnk.Save()
            Start-Process $src -ErrorAction SilentlyContinue
          }

    # WSL Ubuntu の en_US.UTF-8 locale を生成 (nix bash の setlocale 警告解消)
    - resource: PSDscResources/Script
      id: script-wsl-locale
      directives: { description: Generate en_US.UTF-8 locale in WSL Ubuntu }
      settings:
        GetScript: |
          @{ Result = (wsl -d Ubuntu -u root -- locale -a 2>$null) }
        TestScript: |
          try {
            $locales = wsl -d Ubuntu -u root -- locale -a 2>$null
            return ($locales -match 'en_US')
          } catch { return $false }
        SetScript: |
          wsl -d Ubuntu -u root -- locale-gen en_US.UTF-8
          wsl -d Ubuntu -u root -- update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8

    # WSL Ubuntu のデフォルトシェルを zsh に
    # 前提: WSL Ubuntu 導入済 + home-manager で zsh がインストール済
    - resource: PSDscResources/Script
      id: script-wsl-default-shell
      directives: { description: Set WSL Ubuntu default shell to nix zsh }
      settings:
        GetScript: |
          @{
            Result = try {
              $p = wsl -d Ubuntu -u root -- getent passwd gigun 2>$null
              if ($p) { $p.Split(':')[6].Trim() } else { 'no-wsl' }
            } catch { 'error' }
          }
        TestScript: |
          try {
            $p = wsl -d Ubuntu -u root -- getent passwd gigun 2>$null
            if (-not $p) { return $false }
            $current = $p.Split(':')[6].Trim()
            return $current -eq '/home/gigun/.nix-profile/bin/zsh'
          } catch { return $false }
        SetScript: |
          $zsh = '/home/gigun/.nix-profile/bin/zsh'
          # zsh が /etc/shells に無ければ追加
          wsl -d Ubuntu -u root -- sh -c "grep -qxF '$zsh' /etc/shells || echo '$zsh' >> /etc/shells"
          # ログインシェル変更
          wsl -d Ubuntu -u root -- chsh -s $zsh gigun

    # Git credential helper を gh CLI に統一 (Windows GCM から移行)
    # Mac/Linux は home-manager の programs.git で同設定済、全 OS で gh auth login 1 回で完結
    # 前提: gh CLI (winget Github.cli) がインストール済 + ユーザーが `gh auth login` 実行済
    - resource: PSDscResources/Script
      id: script-git-credential-gh
      directives: { description: Set git credential.helper to gh CLI (unify with Mac/Linux) }
      settings:
        GetScript: |
          @{ Result = (git config --global --get credential.helper) }
        TestScript: |
          $current = git config --global --get credential.helper 2>$null
          $current -eq '!gh auth git-credential'
        SetScript: |
          git config --global credential.helper '!gh auth git-credential'

    # シンボリックリンク (wslconfig / wezterm / kanata)
    - resource: PSDscResources/Script
      id: script-symlinks
      directives: { description: Symlink dotfiles/windows configs to user home }
      settings:
        GetScript: |
          @{
            Result = @{
              Wslconfig = (Get-Item "$env:USERPROFILE\.wslconfig" -Force -ErrorAction SilentlyContinue).LinkType
              Wezterm   = (Get-Item "$env:USERPROFILE\.wezterm.lua" -Force -ErrorAction SilentlyContinue).LinkType
              Kanata    = (Get-Item "$env:USERPROFILE\.config\kanata\kanata.kbd" -Force -ErrorAction SilentlyContinue).LinkType
              Gitconfig = (Get-Item "$env:USERPROFILE\.gitconfig" -Force -ErrorAction SilentlyContinue).LinkType
            }
          }
        TestScript: |
          $dotfiles = "$env:USERPROFILE\ghq\github.com\gigun-dev\dotfiles"
          $checks = @{
            "$env:USERPROFILE\.wslconfig"                      = "$dotfiles\windows\wsl\wslconfig"
            "$env:USERPROFILE\.wezterm.lua"                    = "$dotfiles\windows\terminal\wezterm.lua"
            "$env:USERPROFILE\.config\kanata\kanata.kbd"       = "$dotfiles\windows\kanata\kanata.kbd"
            "$env:USERPROFILE\.gitconfig"                      = "$dotfiles\git\gitconfig"
          }
          foreach ($link in $checks.Keys) {
            $item = Get-Item $link -Force -ErrorAction SilentlyContinue
            if (-not $item -or $item.LinkType -ne 'SymbolicLink' -or $item.Target -ne $checks[$link]) { return $false }
          }
          return $true
        SetScript: |
          $dotfiles = "$env:USERPROFILE\ghq\github.com\gigun-dev\dotfiles"
          $map = @{
            "$env:USERPROFILE\.wslconfig"                = "$dotfiles\windows\wsl\wslconfig"
            "$env:USERPROFILE\.wezterm.lua"              = "$dotfiles\windows\terminal\wezterm.lua"
            "$env:USERPROFILE\.config\kanata\kanata.kbd" = "$dotfiles\windows\kanata\kanata.kbd"
            "$env:USERPROFILE\.gitconfig"                = "$dotfiles\git\gitconfig"
          }
          foreach ($link in $map.Keys) {
            $parent = Split-Path -Parent $link
            if (-not (Test-Path $parent)) { New-Item -ItemType Directory -Path $parent -Force | Out-Null }
            if (Test-Path $link) { Remove-Item $link -Force -Recurse }
            New-Item -ItemType SymbolicLink -Path $link -Target $map[$link] | Out-Null
          }

  configurationVersion: '0.2.0'
